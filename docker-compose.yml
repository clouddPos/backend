# version: '3.8'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cloudPos
      POSTGRES_USER: cloudPos
      POSTGRES_PASSWORD: cloudPospass
    ports:
      - '5434:5432'
    volumes:
      - pg-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  adminer:
    image: adminer
    ports:
      - '8080:8080'
    depends_on:
      - db

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://cloudPos:cloudPospass@db:5432/cloudPos
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: development
      PORT: 3000
      JWT_SECRET: replace_with_random_secret
      JWT_REFRESH_SECRET: replace_with_random_refresh_secret
    depends_on:
      - db
      - redis
    ports:
      - '3000:3000'

volumes:
  pg-data:
  redis-data:
